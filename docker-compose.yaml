version: '3.8'

services:
  wiremock:
    image: wiremock/wiremock:latest
    container_name: wiremock_server
    ports:
      - "8081:8080"
    volumes:
      - ./wiremock:/home/wiremock
    restart: unless-stopped
  mysql:
    image: mysql:latest
    container_name: mysql-cep
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=cep
    restart: unless-stopped


